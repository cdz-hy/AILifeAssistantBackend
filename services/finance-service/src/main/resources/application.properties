spring.application.name=finance-service
server.port=8003

spring.cloud.nacos.server-addr=127.0.0.1:8848

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/finance_service_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.example.finance.entity
mybatis.configuration.map-underscore-to-camel-case=true
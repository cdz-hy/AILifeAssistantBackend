spring.application.name=gateway-service
server.port=8000

spring.cloud.nacos.server-addr=127.0.0.1:8848

# Gateway configuration for schedule service
spring.cloud.gateway.routes[0].id=schedule-service
spring.cloud.gateway.routes[0].uri=lb://schedule-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/schedule/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Gateway configuration for finance service
spring.cloud.gateway.routes[1].id=finance-service
spring.cloud.gateway.routes[1].uri=lb://finance-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/finance/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Gateway configuration for diet record service
spring.cloud.gateway.routes[2].id=diet-record-service
spring.cloud.gateway.routes[2].uri=lb://diet-record-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/diet/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Gateway configuration for study service
spring.cloud.gateway.routes[3].id=study-service
spring.cloud.gateway.routes[3].uri=lb://study-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/study/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# Gateway configuration for AI analysis report service
spring.cloud.gateway.routes[4].id=ai-analysis-report-service
spring.cloud.gateway.routes[4].uri=lb://ai-analysis-report-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/ai-analysis/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# Gateway configuration for notification service
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/notification/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# Gateway configuration for user service
spring.cloud.gateway.routes[6].id=user-service
spring.cloud.gateway.routes[6].uri=lb://user-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/user/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# CORS configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Actuator and monitoring endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Logging configuration
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/gateway-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB
logging.logback.rollingpolicy.max-history=30
spring.application.name=schedule-service
server.port=8002

spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
spring.config.import=nacos:schedule-service
spring.cloud.nacos.config.file-extension=schedule-service.json


# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/schedule_service_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=12344321
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.example.schedule.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Jackson configuration for date/time serialization
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false

# JobRunr configuration
org.jobrunr.background-job-server.enabled=true
org.jobrunr.background-job-server.poll-interval-in-seconds=15
org.jobrunr.dashboard.enabled=true
org.jobrunr.dashboard.port=8008


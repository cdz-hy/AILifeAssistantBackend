spring.application.name=user-service
server.port=8001

spring.cloud.nacos.server-addr=127.0.0.1:8848

jwt.secret=${JWT_SECRET:changeit-changeit-changeit-changeit}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

spring.datasource.url=jdbc:mysql://localhost:3306/user_service_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1517
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.example.user.entity
mybatis.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=never
user.avatar.dir=uploads/avatars
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
user.cors.enabled=false